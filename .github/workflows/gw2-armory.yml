name: gw2-armory

on:
  schedule:
    - cron: '30 18 * * *'   # 18:30 UTC daily
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: 'Guild Wars 2'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip 
          pip install -r requirements.txt 

      - name: Run gw2_armory.py
        env:
          R2_ARMORY_CSV_KEY: gw2_legendary_armory.csv
          R2_ARMORY_CACHE_JSON_KEY: gw2_item_cache.json
          GW2_API_KEY: ${{ secrets.GW2_API_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: python gw2_armory.py
